<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gráfico del Día - CIER</title>
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      // La configuración se hace abajo dinámicamente
    </script>

    <style>
        :root {
            --cier-azul: #003366;
            --cier-gris: #f4f4f4;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: var(--cier-gris);
            min-height: 100vh;
        }
        header {
            width: 100%;
            background-color: white;
            padding: 1rem 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            text-align: center;
            margin-bottom: 20px;
        }
        .container {
            max-width: 900px;
            width: 95%;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
        }
        img {
            max-width: 100%;
            height: auto;
            border-radius: 4px;
        }
        .footer {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #666;
            padding-bottom: 20px;
        }
        .error-msg { color: #cc0000; padding: 40px; }
    </style>
</head>
<body>

    <header>
        <h2 style="color: var(--cier-azul); margin: 0;">Observatorio Energético CIER</h2>
    </header>

    <div class="container" id="main-container">
        <div id="loader">Cargando gráfico...</div>
    </div>

    <div class="footer">
        Elaboración: Coordinación Internacional del Área Corporativa — CIER
    </div>

    <script>
        // CONFIGURACIÓN DE GRÁFICOS
        // Solo debes agregar nuevas líneas aquí cuando tengas más imágenes
        const graficos = {
            "perdidas-distribucion": {
                url: "https://github.com/jcbelza/Gr-fico-del-D-a/blob/main/Perdidas_Distribucion.png",
                titulo: "Pérdidas en Distribución - LATAM vs Mundo"
            },
            "ejemplo-2": {
                url: "nombre_de_otra_imagen.png",
                titulo: "Otro Gráfico del Sector"
            }
        };

        function cargarGrafico() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            const container = document.getElementById('main-container');

            // Si el ID existe en nuestra lista
            if (id && graficos[id]) {
                const data = graficos[id];
                
                container.innerHTML = `
                    <h1 style="font-size: 1.5rem; color: #333;">${data.titulo}</h1>
                    <img src="${data.url}" alt="${data.titulo}">
                `;

                // Notificar a Google Analytics sobre este gráfico específico
                gtag('config', 'G-XXXXXXXXXX', {
                    'page_title': data.titulo,
                    'page_path': '/grafico?id=' + id
                });

            } else {
                // Mensaje si no se encuentra el ID o es la página principal
                container.innerHTML = `
                    <div class="error-msg">
                        <h3>Bienvenido al visor de gráficos</h3>
                        <p>Por favor, seleccione un gráfico válido o use el enlace proporcionado.</p>
                    </div>
                `;
            }
        }

        window.onload = cargarGrafico;
    </script>
</body>
</html>
