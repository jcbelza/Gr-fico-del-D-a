<!DOCTYPE html>
<html lang="es">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-X1LGDCTYX0"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
    
      gtag('config', 'G-X1LGDCTYX0');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gráfico del Día - CIER</title>
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-X1LGDCTYX0"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
    </script>

    <style>
        :root { --cier-azul: #003366; --cier-gris: #f4f4f4; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; background-color: var(--cier-gris); min-height: 100vh; }
        header { width: 100%; background-color: white; padding: 1rem 0; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; margin-bottom: 20px; }
        .container { max-width: 1000px; width: 95%; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; }
        img { max-width: 100%; height: auto; border-radius: 4px; border: 1px solid #ddd; }
        .footer { margin-top: 20px; font-size: 0.8rem; color: #666; padding-bottom: 20px; }
    </style>
</head>
<body>

    <header>
        <h2 style="color: var(--cier-azul); margin: 0;">Observatorio Energético CIER</h2>
    </header>

    <div class="container" id="main-container">
        <h1 id="grafico-titulo" style="font-size: 1.5rem; color: #333;">Cargando...</h1>
        <div id="grafico-content"></div>
    </div>

    <div class="footer">
        Elaboración: Coordinación Internacional del Área Corporativa — CIER
    </div>

    <script>
        const graficos = {
            "perdidas": {
                url: "Perdidas_Distribucion.png",
                titulo: "Pérdidas en Distribución - LATAM vs Mundo"
            }
            // Aquí puedes seguir agregando más a futuro
        };

        function cargarGrafico() {
            const params = new URLSearchParams(window.location.search);
            let id = params.get('id');
            
            // CAMBIO CLAVE: Si no hay ID en la URL, usa "perdidas" por defecto
            if (!id || !graficos[id]) {
                id = "perdidas";
            }

            const data = graficos[id];
            document.getElementById('grafico-titulo').innerText = data.titulo;
            document.getElementById('grafico-content').innerHTML = `<img src="${data.url}" alt="${data.titulo}">`;

            // Registro en Analytics
            gtag('config', 'G-X1LGDCTYX0', {
                'page_title': data.titulo,
                'page_path': window.location.pathname + (id !== "perdidas" ? '?id=' + id : '')
            });
        }

        window.onload = cargarGrafico;
    </script>
</body>
</html>
